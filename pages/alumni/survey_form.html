<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Professional Alumni Survey</title>
    <style>
        .stage-transition {
            animation: slideUp 0.4s ease-out forwards;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Custom scrollbar for the form area */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #fcfaf2; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#fcfaf2] font-sans h-screen flex flex-col overflow-hidden">

    <!-- 1. Header (Fixed) -->
    <header class="w-full bg-white border-b border-gray-100 px-8 py-4 flex items-center justify-between shrink-0 z-30">
        <div class="flex items-center gap-3">
            <img src="../../assets/images/isu-logo.png" alt="Logo" class="h-8 w-8">
            <h1 class="font-serif font-bold text-[#1a3d2c] text-lg">GradConnect</h1>
        </div>

    </header>

    <!-- 2. Progress Pipeline (Fixed) -->
    <section class="w-full bg-[#1a3d2c] pt-8 pb-12 px-8 shrink-0 shadow-lg relative z-20">
        <div class="max-w-4xl mx-auto relative">
            <div class="absolute top-5 left-0 w-full h-1 bg-white/10 rounded-full"></div>
            <div id="progress-line" class="absolute top-5 left-0 h-1 bg-[#d9a54a] rounded-full transition-all duration-700 ease-in-out" style="width: 0%;"></div>

            <div class="relative flex justify-between">
                <!-- Step 1 -->
                <div class="flex flex-col items-center gap-3">
                    <div id="circle-1" class="w-10 h-10 rounded-full bg-white border-4 border-[#d9a54a] flex items-center justify-center text-[#1a3d2c] font-black z-10 transition-all duration-500 shadow-xl">1</div>
                    <span id="label-1" class="absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white">Status</span>
                </div>
                <!-- Step 2 -->
                <div class="flex flex-col items-center gap-3">
                    <div id="circle-2" class="w-10 h-10 rounded-full bg-[#1a3d2c] border-4 border-white/10 flex items-center justify-center text-white/40 font-black z-10 transition-all duration-500">2</div>
                    <span id="label-2" class="absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white/30">Profile</span>
                </div>
                <!-- Step 3 -->
                <div class="flex flex-col items-center gap-3">
                    <div id="circle-3" class="w-10 h-10 rounded-full bg-[#1a3d2c] border-4 border-white/10 flex items-center justify-center text-white/40 font-black z-10 transition-all duration-500">3</div>
                    <span id="label-3" class="absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white/30">Alignment</span>
                </div>
                <!-- Step 4 -->
                <div class="flex flex-col items-center gap-3">
                    <div id="circle-4" class="w-10 h-10 rounded-full bg-[#1a3d2c] border-4 border-white/10 flex items-center justify-center text-white/40 font-black z-10 transition-all duration-500">4</div>
                    <span id="label-4" class="absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white/30">Skills</span>
                </div>
                <!-- Step 5 -->
                <div class="flex flex-col items-center gap-3">
                    <div id="circle-5" class="w-10 h-10 rounded-full bg-[#1a3d2c] border-4 border-white/10 flex items-center justify-center text-white/40 font-black z-10 transition-all duration-500">5</div>
                    <span id="label-5" class="absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white/30">Feedback</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. Form Content (Scrollable) -->
    <main class="flex-grow overflow-y-auto custom-scroll relative">
        <div class="max-w-2xl mx-auto py-12 px-6">
            <form id="surveyForm" class="pb-10">
                <!-- Stage 1 -->
                <div class="survey-stage stage-transition" id="stage1">
                    <h2 class="text-3xl font-serif italic text-[#1a3d2c] mb-2">Employment Status</h2>
                    <p class="text-gray-500 mb-8 text-sm">Choose your current professional status.</p>
                    <div class="space-y-3">
                        <label class="group block cursor-pointer">
                            <input type="radio" name="job_status" class="hidden peer">
                            <div class="p-5 bg-white border border-gray-200 rounded-xl peer-checked:border-[#1a3d2c] peer-checked:bg-[#f3f4f0] hover:border-gray-300 transition-all font-medium text-[#1a3d2c] flex justify-between items-center">
                                Employed Full-Time
                                <div class="w-5 h-5 rounded-full border-2 border-gray-200 peer-checked:border-[#1a3d2c] flex items-center justify-center">
                                    <div class="w-2.5 h-2.5 rounded-full bg-[#1a3d2c] scale-0 peer-checked:scale-100 transition-transform"></div>
                                </div>
                            </div>
                        </label>
                        <!-- Add more options here... -->
                    </div>
                </div>

                <!-- Stages 2-5 (Hidden initially) -->
                <div class="survey-stage hidden stage-transition" id="stage2">
                    <h2 class="text-3xl font-serif italic text-[#1a3d2c] mb-2">Profile Details</h2>
                    <input type="text" placeholder="Current Job Title" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:border-[#1a3d2c] focus:ring-4 focus:ring-[#1a3d2c]/5 mb-4">
                    <input type="text" placeholder="Company Name" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:border-[#1a3d2c] focus:ring-4 focus:ring-[#1a3d2c]/5">
                </div>
                <!-- ... other stages ... -->
            </form>
        </div>
    </main>

    <!-- 4. Navigation Footer (Sticky Bottom) -->
    <footer class="w-full bg-white border-t border-gray-200 p-6 shrink-0 z-30">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <button type="button" id="backBtn" class="invisible flex items-center gap-2 px-8 py-3 rounded-xl border-2 border-gray-100 text-gray-500 font-bold text-xs uppercase tracking-widest hover:border-[#1a3d2c] hover:text-[#1a3d2c] hover:bg-[#1a3d2c]/5 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                Previous
            </button>
            
            <div class="flex items-center gap-4">
                <span class="hidden md:block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Progress Saved</span>
                <button type="button" id="nextBtn" class="bg-[#1a3d2c] text-white px-12 py-4 rounded-xl font-bold text-sm shadow-xl hover:bg-[#143023] transition transform active:scale-95 flex items-center gap-2">
                    <span id="btnText">Continue</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        let currentStage = 1;
        const totalStages = 5;

        const nextBtn = document.getElementById('nextBtn');
        const backBtn = document.getElementById('backBtn');
        const btnText = document.getElementById('btnText');
        const progressLine = document.getElementById('progress-line');

        function updateUI() {
            // Update stages
            document.querySelectorAll('.survey-stage').forEach((stage, idx) => {
                stage.classList.toggle('hidden', idx + 1 !== currentStage);
            });

            // Update Progress Line
            const progressPercent = ((currentStage - 1) / (totalStages - 1)) * 100;
            progressLine.style.width = `${progressPercent}%`;

            // Update Pipeline Nodes
            for (let i = 1; i <= totalStages; i++) {
                const circle = document.getElementById(`circle-${i}`);
                const label = document.getElementById(`label-${i}`);
                
                if (i < currentStage) {
                    circle.innerHTML = "✓";
                    circle.className = "w-10 h-10 rounded-full bg-[#d9a54a] border-4 border-[#1a3d2c] flex items-center justify-center text-[#1a3d2c] font-black z-10 transition-all duration-500";
                    label.className = "absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-[#d9a54a]";
                } else if (i === currentStage) {
                    circle.innerHTML = i;
                    circle.className = "w-10 h-10 rounded-full bg-white border-4 border-[#d9a54a] flex items-center justify-center text-[#1a3d2c] font-black z-10 transition-all duration-500 scale-110 shadow-xl";
                    label.className = "absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white";
                } else {
                    circle.innerHTML = i;
                    circle.className = "w-10 h-10 rounded-full bg-[#1a3d2c] border-4 border-white/10 flex items-center justify-center text-white/40 font-black z-10 transition-all duration-500";
                    label.className = "absolute -bottom-8 text-[10px] font-bold uppercase tracking-widest text-white/30";
                }
            }

            backBtn.style.visibility = (currentStage === 1) ? 'hidden' : 'visible';
            btnText.innerText = (currentStage === totalStages) ? 'Submit Records' : 'Continue';
        }

        nextBtn.addEventListener('click', () => {
            if (currentStage < totalStages) {
                currentStage++;
                updateUI();
                document.querySelector('main').scrollTop = 0; // Reset scroll on next
            }
        });

        backBtn.addEventListener('click', () => {
            if (currentStage > 1) {
                currentStage--;
                updateUI();
                document.querySelector('main').scrollTop = 0; // Reset scroll on back
            }
        });
    </script>
</body>
</html>
